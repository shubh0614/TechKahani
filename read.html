<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Kahani</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
</head>
<body>

<div id="lossbar" aria-hidden="true">
  <a class="brand" href="index.html">TECH&nbsp;KAHANI</a>
  <div class="track"><div class="fill" id="fill"></div></div>
  <span class="lossnum"><span id="meterlabel">LOSS</span>:&nbsp;<b id="lossval">—</b></span>
</div>

<header class="hero full">
  <div class="eyebrow" id="h-eyebrow"></div>
  <h1 id="h-title"></h1>
  <div class="alt" id="h-alt"></div>
  <div class="cup" aria-hidden="true">
    <svg viewBox="0 0 120 120">
      <g class="steam">
        <path d="M48 52 C44 42, 54 38, 50 28"/>
        <path d="M60 50 C56 40, 66 36, 62 26"/>
        <path d="M72 52 C68 42, 78 38, 74 28"/>
      </g>
      <path d="M34 64 h52 v16 a26 26 0 0 1 -52 0 z" fill="none" stroke="#e8a33d" stroke-width="3"/>
      <path d="M86 68 h8 a8 8 0 0 1 0 16 h-6" fill="none" stroke="#e8a33d" stroke-width="3"/>
      <path d="M30 104 h60" stroke="#4a3826" stroke-width="3" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="meta" id="h-meta"></div>
  <a class="begin" href="#ch1">Begin the story</a>
  <div class="scrollhint" id="h-hint">scroll — the panel is watching</div>
</header>

<aside id="panel" class="hidden" aria-label="Episode control panel — it reacts as you read"></aside>

<main id="story" aria-live="polite"></main>

<footer>
  <span class="fk">TECH KAHANI</span> · <span id="f-tagline"></span><br>
  <span id="f-credit"></span><br>
  free to read, forever
</footer>

<script>
(function(){
  var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var qn = new URLSearchParams(location.search).get('ep') || '1';
  var WORDS = ['Zero','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve'];

  Promise.all([
    fetch('manifest.json').then(function(r){return r.json()}),
    fetch('episodes/ep' + qn + '.md').then(function(r){
      if(!r.ok) throw new Error('Episode not found');
      return r.text();
    })
  ]).then(function(res){ build(res[0], res[1]); })
  .catch(function(){
    document.getElementById('story').innerHTML =
      '<section class="ritual"><h3>This shelf is empty</h3><p class="sub">That episode hasn\u2019t been brewed yet. <a href="index.html">Back to the library.</a></p></section>';
  });

  function build(manifest, raw){
    // ---- parse config block ----
    var cfgMatch = raw.match(/<!--CONFIG([\s\S]*?)CONFIG-->/);
    var cfg = cfgMatch ? JSON.parse(cfgMatch[1]) : {};
    var body = cfgMatch ? raw.replace(cfgMatch[0], '') : raw;

    // ---- hero & chrome ----
    var epMeta = (manifest.episodes||[]).filter(function(e){return String(e.n)===String(qn)})[0] || {};
    document.title = 'Tech Kahani — Episode ' + qn + ': ' + (epMeta.title || '');
    document.getElementById('h-eyebrow').innerHTML = cfg.eyebrow || ('Tech <span class="dev">\u0915\u0939\u093e\u0928\u0940</span> · Episode ' + qn);
    document.getElementById('h-title').innerHTML = cfg.title || epMeta.title || '';
    document.getElementById('h-alt').textContent = cfg.alt || epMeta.alt || '';
    document.getElementById('h-meta').innerHTML = 'A story in ' + (cfg.chaptersLabel || 'six chapters') + ' · <span>' + (epMeta.minutes||'') + '</span> · no prerequisites, ever';
    document.getElementById('f-tagline').textContent = manifest.series.tagline;
    document.getElementById('f-credit').textContent = 'by ' + manifest.series.author + ' · ' + manifest.series.credit;
    if(cfg.meter){ document.getElementById('meterlabel').textContent = cfg.meter.label; document.getElementById('lossval').textContent = cfg.meter.start; }
    if(cfg.hint){ document.getElementById('h-hint').textContent = cfg.hint; }

    // ---- render panel from config ----
    var panel = document.getElementById('panel');
    var controls = {};
    if(cfg.panel && cfg.panel.controls){
      var html = '<div class="ptitle">' + (cfg.panel.name||'') + '</div><div class="dials">';
      cfg.panel.controls.forEach(function(c){
        if(c.type==='dial') html += '<div class="dial"><div class="knob" id="ctl-'+c.id+'"></div><label>'+c.label+'</label></div>';
      });
      html += '</div>';
      cfg.panel.controls.forEach(function(c){
        if(c.type==='lever') html += '<div class="lever" id="ctl-'+c.id+'"><span class="lab">'+c.label+'</span><div class="sw"></div></div>';
        if(c.type==='light') html += '<div class="plight" id="ctl-'+c.id+'">'+c.label+'</div>';
      });
      html += '<div class="pstatus" id="pstatus"></div>';
      panel.innerHTML = html;
      cfg.panel.controls.forEach(function(c){ controls[c.id] = {el: document.getElementById('ctl-'+c.id), type: c.type}; });
    } else {
      panel.style.display = 'none';
    }

    // ---- render story blocks ----
    marked.setOptions({gfm:true, breaks:false});
    var story = document.getElementById('story');
    var blocks = body.split(/\n(?=# )/).map(function(b){return b.trim()}).filter(Boolean);
    var lastCh = 1;

    blocks.forEach(function(block){
      var nl = block.indexOf('\n');
      var head = (nl===-1 ? block : block.slice(0, nl)).trim();
      var content = nl===-1 ? '' : block.slice(nl+1).trim();
      var chM = head.match(/^# CHAPTER (\d+):\s*(.+)$/i);
      var seM = head.match(/^# SECTION:\s*(.+)$/i);

      if(chM){
        var n = parseInt(chM[1],10); lastCh = n;
        var sec = el('section','chapter'); sec.id='ch'+n; sec.setAttribute('data-ch', n);
        sec.innerHTML = '<div class="ch-label">Chapter '+(WORDS[n]||n)+'</div><h2>'+chM[2]+'</h2><div class="ch-rule"></div>' + marked.parse(content);
        var firstP = sec.querySelector('p'); if(firstP) firstP.classList.add('first');
        story.appendChild(sec);
        return;
      }
      if(seM){
        var name = seM[1].toLowerCase();
        if(name.indexOf('rosetta') === 0){
          var s1 = el('section','ritual'); s1.setAttribute('data-ch', lastCh);
          s1.innerHTML = marked.parse(content);
          var t = s1.querySelector('table');
          if(t){ t.className='rosetta'; var cap=document.createElement('caption'); cap.textContent=seM[1]; t.prepend(cap); }
          s1.style.paddingTop = '40px';
          story.appendChild(s1); return;
        }
        if(name.indexOf('where') === 0){
          var s2 = el('section','ritual'); s2.setAttribute('data-ch', lastCh); s2.style.paddingTop='40px';
          s2.innerHTML = '<h3>'+seM[1]+'</h3><p class="sub">Because an analogy that lies is worse than no analogy.</p><div class="breaks">'+marked.parse(content)+'</div>';
          story.appendChild(s2); return;
        }
        if(name.indexOf('engineer') === 0){
          var s3 = el('section','ritual'); s3.setAttribute('data-ch', lastCh); s3.style.paddingTop='40px';
          s3.innerHTML = '<details class="corner"><summary>'+seM[1]+' — for those who counted the easter eggs</summary><div class="inner">'+marked.parse(content)+'</div></details>';
          story.appendChild(s3); return;
        }
        if(name.indexOf('after') === 0){
          var div = el('div','credits-divider'); div.textContent='· · · after the credits · · ·'; story.appendChild(div);
          var s4 = el('section','ritual'); s4.setAttribute('data-ch','post'); s4.style.paddingTop='0';
          s4.innerHTML = '<div class="teaser">'+marked.parse(content)+'</div>';
          story.appendChild(s4); return;
        }
        if(name.indexOf('next') === 0){
          var s5 = el('section','ritual'); s5.setAttribute('data-ch','post'); s5.style.paddingTop='0';
          s5.innerHTML = '<p class="next">'+marked.parseInline(content)+'</p>';
          story.appendChild(s5); return;
        }
        // generic ritual section (e.g. "What just happened")
        var s6 = el('section','ritual'); s6.setAttribute('data-ch', lastCh);
        s6.innerHTML = '<h3>'+seM[1]+'</h3>' + marked.parse(content);
        story.appendChild(s6); return;
      }
      // fallback: plain markdown
      var s7 = el('section','ritual'); s7.innerHTML = marked.parse(block); story.appendChild(s7);
    });

    // ---- prev/next nav ----
    var nav = el('div','epnav');
    var prev = manifest.episodes.filter(function(e){return e.n==qn-1 && e.status==='live'})[0];
    var next = manifest.episodes.filter(function(e){return e.n==(parseInt(qn,10)+1) && e.status==='live'})[0];
    nav.innerHTML = (prev? '<a href="read.html?ep='+prev.n+'">\u2190 Ep '+prev.n+'</a>' : '<a href="index.html">\u2190 The Library</a>')
      + (next? '<a href="read.html?ep='+next.n+'">Ep '+next.n+' \u2192</a>' : '<a href="index.html">Episode '+(parseInt(qn,10)+1)+' is brewing \u2192</a>');
    story.appendChild(nav);

    // ---- panel engine ----
    var states = cfg.states || {}; var lossBy = cfg.loss || {}; var current=null;
    var lossval = document.getElementById('lossval'); var pstatus = document.getElementById('pstatus');
    var lossCurrent = cfg.meter ? cfg.meter.start : 0; var lossAnim=null;

    function applyState(ch){
      if(ch===current || !states[ch]) return; current=ch;
      var s = states[ch];
      Object.keys(controls).forEach(function(id){
        var c = controls[id]; if(!(id in s)) return;
        if(c.type==='dial') c.el.style.transform = 'rotate('+s[id]+'deg)';
        if(c.type==='lever') c.el.classList.toggle('on', !!s[id]);
        if(c.type==='light') c.el.classList.toggle('on', !!s[id]);
      });
      if(pstatus && s.status) pstatus.textContent = s.status;
      if(s.shake && !reduced){ panel.classList.remove('shake'); void panel.offsetWidth; panel.classList.add('shake'); }
      if(ch in lossBy) animateLoss(lossBy[ch]);
    }
    function animateLoss(target){
      if(reduced){ lossCurrent=target; lossval.textContent=target; return; }
      cancelAnimationFrame(lossAnim);
      var from=lossCurrent, start=null;
      (function tick(t){
        if(!start){ lossAnim=requestAnimationFrame(tick); start=performance.now(); return; }
        var p=Math.min((t-start)/700,1);
        lossCurrent=Math.round(from+(target-from)*p); lossval.textContent=lossCurrent;
        if(p<1) lossAnim=requestAnimationFrame(tick);
      })();
    }

    var obs = new IntersectionObserver(function(es){
      es.forEach(function(e){
        if(e.isIntersecting){
          var ch = e.target.getAttribute('data-ch');
          applyState(isNaN(ch)? ch : parseInt(ch,10));
        }
      });
    }, {rootMargin:'-35% 0px -55% 0px'});
    document.querySelectorAll('[data-ch]').forEach(function(n){ obs.observe(n); });

    // oscillation easter egg (config-driven)
    if(cfg.oscillate && !reduced && controls[cfg.oscillate.control]){
      var o = cfg.oscillate, timer=null, flip=false;
      var target=null;
      document.querySelectorAll('#ch'+o.chapter+' p').forEach(function(p){
        if(p.textContent.indexOf(o.marker)!==-1) target=p;
      });
      if(target){
        new IntersectionObserver(function(es){
          es.forEach(function(e){
            if(e.isIntersecting && !timer){
              timer=setInterval(function(){
                if(current!==o.chapter){ clearInterval(timer); timer=null; return; }
                flip=!flip;
                controls[o.control].el.style.transform='rotate('+(flip?o.a:o.b)+'deg)';
              }, o.ms||600);
            } else if(!e.isIntersecting && timer){
              clearInterval(timer); timer=null;
              if(states[current] && (o.control in states[current]))
                controls[o.control].el.style.transform='rotate('+states[current][o.control]+'deg)';
            }
          });
        }, {rootMargin:'-20% 0px -20% 0px'}).observe(target);
      }
    }

    // panel visibility + progress
    var hero = document.querySelector('.hero');
    window.addEventListener('scroll', function(){
      panel.classList.toggle('hidden', window.scrollY <= hero.offsetHeight*0.7);
      var doc=document.documentElement;
      var p=window.scrollY/(doc.scrollHeight-window.innerHeight);
      document.getElementById('fill').style.width = Math.min(100,Math.max(0,p*100))+'%';
    }, {passive:true});
  }

  function el(tag, cls){ var n=document.createElement(tag); n.className=cls; return n; }
})();
</script>
</body>
</html>
